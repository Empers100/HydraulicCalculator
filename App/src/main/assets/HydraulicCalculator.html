<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Гидравлический калькулятор</title>
<style>
        /* Стили оставлены без изменений для читаемости */
        :root {
            --bg: #f4f4f4;
            --surface: #ffffff;
            --text: #333333;
            --text-secondary: #666666;
            --border: #cccccc;
            --btn-bg: #e0e0e0;
            --btn-func: #d0d0d0;
            --btn-active: #0096c9;
            --btn-active-text: white;
            --shadow: 0 2px 8px rgba(0,0,0,0.1);
            --display-bg: #f5f5f5;
        }
        body.dark {
            --bg: #1a1a2e;
            --surface: #2d2d44;
            --text: #f0f0f0;
            --text-secondary: #cccccc;
            --border: #444466;
            --btn-bg: #4a4a6a;
            --btn-func: #5a5a7a;
            --btn-active: #0f3460;
            --shadow: 0 2px 8px rgba(0,0,0,0.4);
            --display-bg: #1e1e2f;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            background: var(--bg); color: var(--text);
            display: flex; justify-content: center; padding: 12px; min-height: 100vh;
            transition: background 0.3s;
        }
        .container {
            width: 100%; max-width: 580px; background: var(--surface);
            border-radius: 24px; box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            padding: 16px; display: flex; flex-direction: column; gap: 12px; position: relative;
        }
        .header { display: flex; justify-content: flex-end; align-items: center; }
        .menu-btn {
            width: 40px; height: 40px; border: none; background: var(--btn-bg);
            color: var(--text); font-size: 24px; font-weight: bold; border-radius: 12px;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
        }
        .menu {
            position: absolute; top: 60px; right: 16px; background: var(--surface);
            border-radius: 16px; box-shadow: 0 8px 24px rgba(0,0,0,0.3);
            padding: 12px; z-index: 100; min-width: 230px; display: none; border: 1px solid var(--border);
        }
        .menu.show { display: block; }
        .menu-item {
            display: flex; align-items: center; justify-content: space-between;
            padding: 10px 8px; border-bottom: 1px solid var(--border); color: var(--text); font-size: 16px;
        }
        .menu-item:last-child { border-bottom: none; }
        .menu-item select, .menu-item button {
            padding: 6px 10px; border-radius: 8px; border: 1px solid var(--border);
            background: var(--btn-bg); color: var(--text); font-size: 14px; cursor: pointer;
        }
        .theme-toggle {
            width: 50px; height: 26px; background: var(--btn-bg); border-radius: 13px;
            position: relative; cursor: pointer; border: 1px solid var(--border);
        }
        .theme-toggle::after {
            content: ''; width: 22px; height: 22px; background: var(--btn-active);
            border-radius: 50%; position: absolute; top: 1px; left: 2px; transition: 0.2s;
        }
        body.dark .theme-toggle::after { transform: translateX(24px); }
        .tab-content { display: flex; flex-direction: column; gap: 12px; }
        .display-container { display: flex; flex-direction: column; }
        .formula-display {
            padding: 8px 16px; font-size: 14px; text-align: right;
            background: var(--display-bg); border-radius: 16px 16px 0 0;
            color: var(--text-secondary); min-height: 36px; word-wrap: break-word;
            border-bottom: 1px solid var(--border);
        }
        .main-display-row {
            display: flex; align-items: center; background: var(--display-bg);
            border-radius: 0 0 16px 16px; padding: 0 16px;
        }
        .main-display-row label {
            font-size: 14px; color: var(--text-secondary); margin-right: 8px; white-space: nowrap;
        }
        .main-display {
            flex: 1; padding: 16px 0; font-size: 28px; text-align: right;
            background: transparent; border: none; font-weight: 500; color: var(--text);
            outline: none; width: 100%;
        }
        .field-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
        .field-row label { flex: 1; font-size: 14px; color: var(--text-secondary); margin-right: 2px; }
        .field-row input, .field-row select {
            flex: 1; padding: 10px 8px; border: 1px solid var(--border);
            border-radius: 10px; background: var(--btn-bg); color: var(--text);
            font-size: 16px; text-align: right; min-width: 0;
        }
        .engineer-block { display: none; flex-direction: column; gap: 6px; }
        .engineer-block.show { display: flex; }
        .info-block { display: none; margin-top: 8px; }
        .info-block.show { display: block; }
        .info-panel {
            font-size: 12px; color: var(--text-secondary); font-style: italic;
            background: var(--display-bg); padding: 8px; border-radius: 12px;
            margin-bottom: 4px; display: none;
        }
        .info-panel.show { display: block; }
        .warning-text { color: #e06c00; font-weight: 500; font-size: 13px; margin-top: 4px; display: none; }
        .warning-text.show { display: block; }
        .btn-row { display: flex; gap: 8px; margin-top: 12px; }
        .calc-btn, .save-btn {
            flex: 1; padding: 14px; font-size: 16px; font-weight: bold;
            background: var(--btn-active); color: white; border: none;
            border-radius: 14px; cursor: pointer;
        }
        .save-btn:disabled { opacity: 0.5; cursor: default; }
        .result-area {
            background: var(--display-bg); border-radius: 16px; padding: 12px;
            display: flex; flex-direction: column; gap: 4px; font-size: 14px;
        }
        .result-area span { color: var(--text); }
        .note { color: #e06c00; font-weight: 500; }
        .extra-resistances { display: none; flex-direction: column; gap: 6px; }
        .extra-resistances.show { display: flex; }
</style>
</head>
<body>
<div class="container">
<div class="header">
<button class="menu-btn" id="menuToggle">⋮</button>
<div class="menu" id="settingsMenu">
<div class="menu-item">
<span id="langLabel">Язык / Language</span>
<select id="langSelect">
<option value="ru">Русский</option>
<option value="en">English</option>
<option value="zh">中文</option>
</select>
</div>
<div class="menu-item">
<span id="themeLabel">Светлая тема</span>
<div class="theme-toggle" id="themeToggle"></div>
</div>
<div class="menu-item">
<button id="shareBtn" style="width:100%;">📤 Поделиться</button>
</div>
</div>
</div>
<div class="tab-content active">
<div class="display-container">
<div class="formula-display" id="formulaDisplay">Готов к расчёту</div>
<div class="main-display-row">
<label id="lblFlowRate">Скорость потока:</label>
<input type="text" class="main-display" id="mainDisplay" value="0" readonly>
</div>
</div>
<div class="field-row"><label id="lblOuterDiam">Наружный диаметр (мм):</label><input type="number" id="outerDiam" value="57" min="0.1" step="any"></div>
<div class="field-row"><label id="lblWall">Толщина стенки (мм):</label><input type="number" id="wall" value="3.5" min="0" step="any"></div>
<div class="field-row"><label id="lblLength">Длина (м):</label><input type="number" id="length" value="100" min="0.001" step="any"></div>
<div class="field-row"><label id="lblMassFlow">Массовый расход<br>(кг/ч):</label><input type="number" id="massFlow" value="5000" min="0.001" step="any"></div>
<div class="field-row"><label id="lblMode">Режим:</label><select id="modeSelect"><option value="simple" id="modeSimpleText">Упрощённый</option><option value="engineer" id="modeEngineerText">Инженерный</option></select></div>
<div class="field-row"><label id="lblDensity">Плотность (кг/м³):</label><input type="number" id="density" value="1000" min="0.001" step="any"></div>
<div class="engineer-block" id="engineerBlock">
<div class="field-row"><label id="lblMedium">Тип среды:</label><select id="mediumSelect"><option value="liquid" id="mediumLiquidText">Жидкость</option><option value="gas" id="mediumGasText">Газ</option></select></div>
<div class="field-row"><label id="lblPreset">Типичные среды:</label><select id="presetSelect">
<option value="choose" id="presetChooseText">Выберите среду...</option>
<option value="water" id="presetWaterText">Вода</option>
<option value="oil" id="presetOilText">Масло</option>
<option value="air" id="presetAirText">Воздух</option>
<option value="nitrogen" id="presetNitrogenText">Азот</option>
<option value="oxygen" id="presetOxygenText">Кислород</option>
<option value="methane" id="presetMethaneText">Метан</option>
<option value="co2" id="presetCO2Text">CO₂</option>
<option value="parahydrogen" id="presetParahydrogenText">Водород (пара)</option>
<option value="normalhydrogen" id="presetNormalhydrogenText">Водород (норм.)</option>
<option value="helium4" id="presetHelium4Text">Гелий-4</option>
<option value="neon" id="presetNeonText">Неон</option>
<option value="argon" id="presetArgonText">Аргон</option>
<option value="krypton" id="presetKryptonText">Криптон</option>
<option value="xenon" id="presetXenonText">Ксенон</option>
<option value="ammonia" id="presetAmmoniaText">Аммиак</option>
<option value="ethane" id="presetEthaneText">Этан</option>
<option value="ethylene" id="presetEthyleneText">Этилен</option>
<option value="propane" id="presetPropaneText">Пропан</option>
<option value="freon22" id="presetFreon22Text">Фреон-22</option>
</select></div>
<div class="field-row"><label id="lblViscosity">Вязкость (сСт):</label><input type="number" id="viscosity" value="1.0" min="0.001" step="any"></div>
<div class="field-row"><label id="lblRoughness">Шероховатость (мм):</label><input type="number" id="roughness" value="0.1" min="0" step="any"></div>
<div class="field-row" id="gasPropsRow" style="display:none;"><label id="lblPressure">Абс. давление (бар):</label><input type="number" id="pressure" value="1.0" min="0.001" step="any"></div>
<div class="field-row" style="display:none;"><label id="lblTemperature">Температура (°C):</label><input type="number" id="temperature" value="20.0" min="-273.15" step="any"></div>
<div class="field-row" style="display:none;"><label id="lblMolarMass">Молярная масса (г/моль):</label><input type="number" id="molarMass" value="28.97" min="0.001" step="any"></div>
</div>
<div class="field-row"><label id="lblBends">Поворотов 90° (ζ=0.3):</label><input type="number" id="bends" value="0" min="0" step="1"></div>
<div class="field-row"><label id="lblValves">Клапанов (ζ=3.0):</label><input type="number" id="valves" value="0" min="0" step="1"></div>
<div id="extraResistances" class="extra-resistances">
<div class="field-row"><label id="lblContractions">Сужений (ζ=0.5):</label><input type="number" id="contractions" value="0" min="0" step="1"></div>
<div class="field-row"><label id="lblExpansions">Расширений (ζ=1.0):</label><input type="number" id="expansions" value="0" min="0" step="1"></div>
<div class="field-row"><label id="lblOrifices">Дросселей/диафрагм (ζ=2.0):</label><input type="number" id="orifices" value="0" min="0" step="1"></div>
</div>
<div class="field-row"><label id="lblPressureUnit">Единицы давления:</label><select id="pressureUnit"><option value="Pa">Pa</option><option value="kPa">kPa</option><option value="bar">bar</option><option value="kgf/cm²">kgf/cm²</option><option value="psi">psi</option></select></div>
<div id="infoBlock" class="info-block">
<div class="info-panel" id="infoPanel"></div>
<div class="warning-text" id="warningExtreme"></div>
</div>
<div class="btn-row">
<button class="calc-btn" id="calculateBtn">Рассчитать</button>
<button class="save-btn" id="saveBtn" disabled>Сохранить в файл</button>
</div>
<div class="result-area" id="resultArea">
<span id="velocityResult">Скорость: ---</span>
<span id="pressureDropResult">Потеря давления: ---</span>
<span id="reynoldsResult">Число Рейнольдса: ---</span>
<span id="lambdaResult">Коэффициент трения λ: ---</span>
<span id="compressNote" class="note"></span>
</div>
</div>
</div>

        // Вспомогательные функции real gas моделей
        function getSaturationPressure(T_K, gas) {
            const coeffs = antoineCoeffs[gas];
            if (!coeffs) return null;
            if (T_K > coeffs.Tmin && T_K < coeffs.Tmax) {
                return Math.pow(10, coeffs.A - coeffs.B / (T_K + coeffs.C));
            }
            if (gas === 'helium4' && T_K > 2.0 && T_K < 5.2) return Math.exp(2.5 - 7.0 / T_K);
            if ((gas === 'parahydrogen' || gas === 'normalhydrogen') && T_K > 14 && T_K < 33) return Math.exp(3.15 - 32.0 / T_K);
            return null;
        }

        function determinePhase(P_bar, P_sat, T_K, Tc) {
            if (T_K >= Tc) return 'supercritical';
            if (P_sat === null) return 'gas';
            const tol = 0.001;
            if (P_bar < P_sat * (1 - tol)) return 'gas';
            if (P_bar > P_sat * (1 + tol)) return 'liquid';
            return 'two-phase';
        }

        function alphaTwu(Tr, w) {
            const alpha0 = Math.pow(Tr, -0.171813) * Math.exp(0.125283 * (1 - Math.pow(Tr, 1.77634)));
            const alpha1 = Math.pow(Tr, -0.607352) * Math.exp(0.511614 * (1 - Math.pow(Tr, 2.20517)));
            return alpha0 + w * (alpha1 - alpha0);
        }

        function calcZ_PengRobinson(T, P_bar, Tc, Pc, w, phase) {
            const R = 8.314462618;
            const Tr = T / Tc;
            if (Tr <= 0 || Pc <= 0) return 1.0;
            let alpha;
            if (phase === 'liquid' && Tr < 1.0) {
                alpha = alphaTwu(Tr, w);
            } else {
                const kappa = 0.37464 + 1.54226 * w - 0.26992 * w * w;
                alpha = Math.pow(1 + kappa * (1 - Math.sqrt(Tr)), 2);
            }
            const a = 0.45724 * R * R * Tc * Tc / (Pc * 1e5) * alpha;
            const b = 0.07780 * R * Tc / (Pc * 1e5);
            const A = a * (P_bar * 1e5) / (R * R * T * T);
            const B = b * (P_bar * 1e5) / (R * T);
            const a2 = -(1 - B);
            const a1 = A - 2*B - 3*B*B;
            const a0 = -(A*B - B*B - B*B*B);
            const Q = (3*a1 - a2*a2) / 9;
            const R_ = (9*a2*a1 - 27*a0 - 2*a2*a2*a2) / 54;
            const D = Q*Q*Q + R_*R_;
            let Z;
            if (D >= 0) {
                const sqrtD = Math.sqrt(D);
                const S = Math.cbrt(R_ + sqrtD);
                const T_ = Math.cbrt(R_ - sqrtD);
                Z = S + T_ - a2/3;
            } else {
                const theta = Math.acos(R_ / Math.sqrt(-Q*Q*Q));
                const sqrtQ = Math.sqrt(-Q);
                const z1 = 2 * sqrtQ * Math.cos(theta/3) - a2/3;
                const z2 = 2 * sqrtQ * Math.cos((theta + 2*Math.PI)/3) - a2/3;
                const z3 = 2 * sqrtQ * Math.cos((theta + 4*Math.PI)/3) - a2/3;
                const roots = [z1, z2, z3].sort((a, b) => a - b);
                if (phase === 'liquid') Z = roots[0];
                else if (phase === 'supercritical' || phase === 'two-phase') Z = roots[2];
                else Z = roots[2];
            }
            return Math.max(Z, 0.05);
        }

        function calcZ(T, P_bar, Tc, Pc, w) {
            return calcZ_PengRobinson(T, P_bar, Tc, Pc, w, 'gas');
        }

        function calcRealGasDensity(T_C, P_bar, gas) {
            const M = parseFloat(document.getElementById('molarMass').value) || 28.97;
            const T_K = T_C + 273.15;
            const crit = gasCritical[gas];
            if (!crit) return (P_bar * 1e5 * (M/1000)) / (8.314 * T_K);
            const P_sat = getSaturationPressure(T_K, gas);
            const phase = determinePhase(P_bar, P_sat, T_K, crit.Tc);
            window._lastPhaseInfo = { phase, P_sat, gas, T_K, P_bar };
            let density;
            if (phase === 'liquid') {
                const rackett = rackettParams[gas];
                if (rackett && T_K < crit.Tc) {
                    const Tr = T_K / crit.Tc;
                    const Vsat = rackett.Vc * Math.pow(rackett.Zra, Math.pow(1 - Tr, 0.2857));
                    density = (M / 1000) / Vsat;
                } else {
                    const Z = calcZ_PengRobinson(T_K, P_bar, crit.Tc, crit.Pc, crit.w, 'liquid');
                    density = (P_bar * 1e5 * (M/1000)) / (Z * 8.314 * T_K);
                }
            } else if (phase === 'supercritical') {
                const Z = calcZ_PengRobinson(T_K, P_bar, crit.Tc, crit.Pc, crit.w, 'supercritical');
                density = (P_bar * 1e5 * (M/1000)) / (Z * 8.314 * T_K);
            } else if (phase === 'two-phase') {
                const Z = calcZ_PengRobinson(T_K, P_bar, crit.Tc, crit.Pc, crit.w, 'two-phase');
                density = (P_bar * 1e5 * (M/1000)) / (Z * 8.314 * T_K);
            } else {
                const Z = calcZ_PengRobinson(T_K, P_bar, crit.Tc, crit.Pc, crit.w, 'gas');
                density = (P_bar * 1e5 * (M/1000)) / (Z * 8.314 * T_K);
            }
            return Math.max(density, 0.001);
        }

        function calcRealGasViscosity(T_C, P_bar, gas) {
            const crit = gasCritical[gas];
            if (!crit) return null;
            const M = parseFloat(document.getElementById('molarMass').value) || 28.97;
            const T_K = T_C + 273.15;
            const Tc = crit.Tc, Pc = crit.Pc;
            const P_sat = getSaturationPressure(T_K, gas);
            const phase = determinePhase(P_bar, P_sat, T_K, Tc);
            if (phase === 'liquid') {
                const Tr = T_K / Tc;
                const mu_boil = 0.1 * Math.pow(M, 0.5) * Math.pow(Tc, -0.5) * 1e-3;
                const tempCorr = Math.exp(2.5 * (1 - Tr));
                const Pr = P_bar / Pc;
                const pressCorr = 1 + 0.5 * Math.max(0, Pr - 1);
                return Math.max(mu_boil * tempCorr * pressCorr, 1e-6);
            }
            const sigma = 2.44 * Math.pow(Tc / Pc, 1/3);
            const Tstar = T_K / (Tc * 0.77);
            const Omega = 1.16145 * Math.pow(Tstar, -0.14874) + 0.52487 * Math.exp(-0.77320 * Tstar) + 2.16178 * Math.exp(-2.43787 * Tstar);
            const mu0 = 2.6693e-6 * Math.sqrt(M * T_K) / (sigma * sigma * Omega);
            const xi_muP = Math.pow(Tc, 1/6) / (Math.pow(M, 0.5) * Math.pow(Pc, 2/3));
            const mu0_muP = mu0 * 1e7;
            const psi = mu0_muP * xi_muP;
            const rho = calcRealGasDensity(T_C, P_bar, gas);
            const rho_molar = rho / (M / 1000);
            const Zc = 0.27;
            const Vc = Zc * 8.314 * Tc / (Pc * 1e5);
            const rho_r = rho_molar * Vc;
            if (rho_r <= 0.001) return mu0;
            const poly = [1.023, 0.23364, 0.58533, -0.40758, 0.093324];
            let sum = 0;
            for (let i = 0; i < poly.length; i++) sum += poly[i] * Math.pow(rho_r, i);
            const mu_mu0 = 1 + (Math.pow(sum, 4) - 1) / psi;
            return Math.max(mu0 * mu_mu0, 0.5 * mu0);
        }

        function syncFromTemperatureAndPressure() {
            if (updating) return;
            if (modeSelect.value !== 'engineer' || mediumSelect.value !== 'gas') return;
            updating = true;
            const T = parseFloat(document.getElementById('temperature').value);
            const P = parseFloat(document.getElementById('pressure').value);
            const gas = presetSelect.value;
            if (!isNaN(T) && T > -273.14) {
                const P_bar = isNaN(P) ? 1.0 : Math.max(P, 0.001);
                const densityReal = calcRealGasDensity(T, P_bar, gas);
                if (densityReal > 0) document.getElementById('density').value = densityReal.toFixed(4);
                const mu_dyn = calcRealGasViscosity(T, P_bar, gas);
                if (mu_dyn && densityReal > 0) document.getElementById('viscosity').value = (mu_dyn / densityReal * 1e6).toFixed(4);
                updateInfoPanel();
                checkConditions();
            }
            updating = false;
        }

        function syncFromDensity() {
            if (updating) return;
            if (modeSelect.value !== 'engineer' || mediumSelect.value !== 'gas') return;
            updating = true;
            const P = parseFloat(document.getElementById('pressure').value);
            const rho = parseFloat(document.getElementById('density').value);
            const gas = presetSelect.value;
            if (!isNaN(P) && P > 0 && !isNaN(rho) && rho > 0) {
                let T_C = 20;
                let prevDiff = Infinity;
                for (let i = 0; i < 30; i++) {
                    const rho_calc = calcRealGasDensity(T_C, P, gas);
                    const diff = rho_calc - rho;
                    if (Math.abs(diff) < 0.001) break;
                    if (i > 15 && Math.abs(diff) > Math.abs(prevDiff)) break;
                    const step = Math.min(Math.abs(diff) * 0.5, 2) * Math.sign(diff) * -1;
                    if (Math.abs(step) < 0.01) break;
                    T_C = Math.max(-273.14, Math.min(2000, T_C + step));
                    prevDiff = diff;
                }
                document.getElementById('temperature').value = T_C.toFixed(2);
                const mu_dyn = calcRealGasViscosity(T_C, P, gas);
                if (mu_dyn && rho > 0) document.getElementById('viscosity').value = (mu_dyn / rho * 1e6).toFixed(4);
                updateInfoPanel();
                checkConditions();
            }
            updating = false;
        }

        function checkConditions() {
            warningExtreme.classList.remove('show');
            warningExtreme.textContent = '';
            if (modeSelect.value !== 'engineer') return;
            const preset = presetSelect.value;
            if (mediumSelect.value === 'gas') {
                const T = parseFloat(document.getElementById('temperature').value);
                const P = parseFloat(document.getElementById('pressure').value);
                const T_K = T + 273.15;
                const P_sat = getSaturationPressure(T_K, preset);
                const limits = limitsForPreset(preset);
                let msgs = [];
                if (limits) {
                    const tmin = limits.Tmin - 273.15;
                    const tmax = limits.Tmax - 273.15;
                    const pmin = limits.Pmin;
                    const pmax = limits.Pmax;
                    if (!isNaN(T) && (T < tmin || T > tmax)) msgs.push(t('warningExtremeTemp'));
                    if (!isNaN(P) && (P < pmin || P > pmax)) msgs.push(t('warningExtremePressure'));
                }
                if (P_sat !== null && !isNaN(P)) {
                    if (P >= P_sat * (1 - 0.001)) {
                        msgs.push(t('warningSaturationAbove'));
                    } else if (P >= P_sat * 0.9) {
                        msgs.push(t('warningNearSaturation'));
                    }
                }
                const phaseInfo = window._lastPhaseInfo;
                if ((!phaseInfo || phaseInfo.phase === 'gas' || phaseInfo.phase === 'two-phase') && gasCritical[preset]) {
                    const crit = gasCritical[preset];
                    const Z = calcZ_PengRobinson(T_K, P, crit.Tc, crit.Pc, crit.w, 'gas');
                    if (Math.abs(Z - 1) > 0.1) msgs.push(t('warningIdealGas'));
                }
                if (msgs.length) {
                    warningExtreme.innerHTML = msgs.join('<br>');
                    warningExtreme.classList.add('show');
                }
            } else {
                const density = parseFloat(document.getElementById('density').value);
                const viscosity = parseFloat(document.getElementById('viscosity').value);
                const liq = liquidLimits[preset];
                if (liq) {
                    let msgs = [];
                    if (!isNaN(density) && (density < liq.densityMin || density > liq.densityMax)) msgs.push(t('warningLiquidDensity'));
                    if (!isNaN(viscosity) && (viscosity < liq.viscosityMin || viscosity > liq.viscosityMax)) msgs.push(t('warningLiquidViscosity'));
                    if (msgs.length) {
                        warningExtreme.textContent = msgs.join(' ');
                        warningExtreme.classList.add('show');
                    }
                }
            }
        }

        calculateBtn.addEventListener('click', ()=>{
            try {
                const bends = parseInt(document.getElementById('bends').value)||0;
                const valves = parseInt(document.getElementById('valves').value)||0;
                const contractions = parseInt(document.getElementById('contractions').value)||0;
                const expansions = parseInt(document.getElementById('expansions').value)||0;
                const orifices = parseInt(document.getElementById('orifices').value)||0;
                const outerD = parseFloat(document.getElementById('outerDiam').value);
                const wall = parseFloat(document.getElementById('wall').value);
                const density = parseFloat(document.getElementById('density').value);
                const length = parseFloat(document.getElementById('length').value);
                const massFlow = parseFloat(document.getElementById('massFlow').value);
                if (outerD<=0||wall<0||outerD-2*wall<=0) { alert(t('errorDiam')); return; }
                if (density<=0||length<=0||massFlow<=0) { alert(t('errorPos')); return; }
                const innerD = outerD-2*wall;
                const area = Math.PI*Math.pow(innerD/1000,2)/4;
                const velocity = massFlow/3600/area/density;
                let deltaP, lambda=0, re=0;
                let diff = null, machExceeded = false;

                if (modeSelect.value=='simple') {
                    deltaP = density*Math.pow(velocity,2)/2*(41*length/innerD+5*valves+0.17*bends);
                    lastResult.mode='simple';
                } else {
                    const viscosity = parseFloat(document.getElementById('viscosity').value);
                    const roughness = parseFloat(document.getElementById('roughness').value);
                    const kinVisc = viscosity*1e-6;
                    const medium = mediumSelect.value;
                    lastResult.mediumType=medium; lastResult.preset=presetSelect.value;
                    if (medium=='gas') {
                        const pressure = parseFloat(document.getElementById('pressure').value)*1e5;
                        const temperature = parseFloat(document.getElementById('temperature').value)+273.15;
                        const molarMass = parseFloat(document.getElementById('molarMass').value)/1000;
                        const R=8.314;
                        const densityCalc = pressure*molarMass/(R*temperature);
                        diff = Math.abs(density-densityCalc)/densityCalc*100;
                        const gamma = getGamma(presetSelect.value);
                        const soundSpeed = Math.sqrt(gamma*R*temperature/molarMass);
                        machExceeded = velocity/soundSpeed > 0.3;
                    }
                    re = velocity*(innerD/1000)/kinVisc;
                    lambda = (re<2300)?64/re:0.25/Math.pow(Math.log10(roughness/innerD/3.7+5.74/Math.pow(re,0.9)),2);
                    const totalZeta = lambda*length*1000/innerD + bends*0.3 + valves*3.0 + contractions*0.5 + expansions*1.0 + orifices*2.0;
                    deltaP = totalZeta*density*velocity*velocity/2;
                    lastResult.re=re; lastResult.lambda=lambda;
                }
                lastResult.velocity=velocity; lastResult.deltaP=deltaP;
                lastResult.pressureUnit = document.getElementById('pressureUnit').value;
                // Сохраняем данные для перевода сообщения о сжимаемости
                lastResult.compressDiff = (diff !== null && diff > 10) ? diff : null;
                lastResult.compressMach = machExceeded;
                updateCompressNote();

                saveBtn.disabled=false;
                updateResultLabels();
                updateDisplayWithResult();
            } catch (e) { alert(t('errorNum')); }
        });

        function getGamma(p){
            const m={ air:1.4, nitrogen:1.4, oxygen:1.4, methane:1.31, co2:1.3, parahydrogen:1.41, normalhydrogen:1.41, helium4:1.67, neon:1.67, argon:1.67, krypton:1.67, xenon:1.67, ammonia:1.33, ethane:1.2, ethylene:1.24, propane:1.13, freon22:1.19 };
            return m[p]||1.4;
        }

        function formatPressure(pa, unit) {
            const loc = locales[currentLang];
            const unitLoc = loc.units[unit] || unit;
            let v;
            switch(unit) {
                case 'Pa': v = pa; break;
                case 'kPa': v = pa / 1e3; break;
                case 'bar': v = pa / 1e5; break;
                case 'kgf/cm²': v = pa / 98066.5; break;
                case 'psi': v = pa / 6894.76; break;
                default: v = pa;
            }
            return v.toFixed(3) + ' ' + unitLoc;
        }

            const loc = locales[currentLang];
            let r = `=== ${loc.title} ===\n${new Date().toLocaleString()}\n`;
            if (lastResult.mode=='engineer') r += `${loc.medium} ${loc[lastResult.mediumType]||lastResult.mediumType}\n${loc.presetLabel} ${loc['preset'+(lastResult.preset.charAt(0).toUpperCase()+lastResult.preset.slice(1))]||lastResult.preset}\n`;
            r += `\n--- ${loc.calculate} ---\n`;
            r += `${loc.bends.split(' ')[0]} ${document.getElementById('bends').value}\n`;
            r += `${loc.valves.split(' ')[0]} ${document.getElementById('valves').value}\n`;
            r += `${loc.contractions.split(' ')[0]} ${document.getElementById('contractions').value}\n`;
            r += `${loc.expansions.split(' ')[0]} ${document.getElementById('expansions').value}\n`;
            r += `${loc.orifices.split(' ')[0]} ${document.getElementById('orifices').value}\n`;
            r += `${loc.outerDiam.split(' ')[0]} ${document.getElementById('outerDiam').value} ${loc.units.mm}\n`;
            r += `${loc.wall.split(' ')[0]} ${document.getElementById('wall').value} ${loc.units.mm}\n`;
            r += `${loc.length.split(' ')[0]} ${document.getElementById('length').value} ${loc.units.m}\n`;
            r += `${loc.massFlow.split('<br>')[0].replace(/:/g,'')} ${document.getElementById('massFlow').value} ${loc.units.kgh}\n`;
            r += `${loc.density.split(' ')[0]} ${document.getElementById('density').value} ${loc.units.kgm3}\n`;
            if (lastResult.mode=='engineer') {
                r += `${loc.viscosity.split(' ')[0]} ${document.getElementById('viscosity').value} ${loc.units.cSt}\n`;
                r += `${loc.roughness.split(' ')[0]} ${document.getElementById('roughness').value} ${loc.units.mm}\n`;
                if (lastResult.mediumType=='gas') {
                    r += `${loc.pressure.split(' ')[0]} ${document.getElementById('pressure').value} ${loc.units.bar}\n`;
                    r += `${loc.temperature.split(' ')[0]} ${document.getElementById('temperature').value} °C\n`;
                    r += `${loc.molarMass.split(' ')[0]} ${document.getElementById('molarMass').value} ${loc.units.gmol}\n`;
                }
            }
            r += `\n--- ${loc.save} ---\n`;
            r += `${loc.velocity}: ${lastResult.velocity.toFixed(3)} ${loc.units.m_s}\n`;
            r += `${loc.pressureDrop}: ${formatPressure(lastResult.deltaP, lastResult.pressureUnit)}\n`;
            if (lastResult.re>0) r += `${loc.reynolds}: ${lastResult.re.toFixed(0)}\n`;
            if (lastResult.lambda>0) r += `${loc.lambda}: ${lastResult.lambda.toFixed(4)}\n`;
            return r;
        }

        shareBtn.addEventListener('click', ()=>{
            const shareUrl = 'https://github.com/Empers100/HydraulicCalculator';
            const textOnly = (lastResult.velocity>0) ? buildReport() : t('shareText');
            if (typeof AndroidShare!=='undefined' && AndroidShare.shareText) {
                AndroidShare.shareText(t('title'), textOnly, shareUrl);
            } else if (navigator.share) {
                navigator.share({ title: t('title'), text: textOnly, url: shareUrl }).catch(()=>{});
            }
            settingsMenu.classList.remove('show');
        });

        document.querySelectorAll('input[type="number"]').forEach(input => {
            if (input.id==='temperature') return;
            input.addEventListener('keydown', e=>{ if(e.key==='-'||e.key==='+'||e.key==='e'||e.key==='E') e.preventDefault(); });
            input.addEventListener('input', function() {
                this.value = this.value.replace(/[^\d.,]/g, '').replace(',', '.');
                const dotIndex = this.value.indexOf('.');
                if (dotIndex !== -1) this.value = this.value.substring(0, dotIndex+1) + this.value.substring(dotIndex+1).replace(/\./g, '');
            });
            input.addEventListener('blur', function() {
                if (this.id==='bends'||this.id==='valves') {
                    let i = parseInt(this.value);
                    this.value = (!isNaN(i) && i>=0) ? i : 0;
                }
                if (this.value.endsWith('.')) this.value = this.value.slice(0, -1);
            });
        });

        updateEngineerVisibility();
    })();
</script>
</body>
</html>
