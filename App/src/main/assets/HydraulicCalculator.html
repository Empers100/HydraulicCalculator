<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Гидравлический калькулятор</title>
<style>
        :root {
            --bg: #f4f4f4;
            --surface: #ffffff;
            --text: #333333;
            --text-secondary: #666666;
            --border: #cccccc;
            --btn-bg: #e0e0e0;
            --btn-func: #d0d0d0;
            --btn-active: #0096c9;
            --btn-active-text: white;
            --shadow: 0 2px 8px rgba(0,0,0,0.1);
            --display-bg: #f5f5f5;
        }
        body.dark {
            --bg: #1a1a2e;
            --surface: #2d2d44;
            --text: #f0f0f0;
            --text-secondary: #cccccc;
            --border: #444466;
            --btn-bg: #4a4a6a;
            --btn-func: #5a5a7a;
            --btn-active: #0f3460;
            --shadow: 0 2px 8px rgba(0,0,0,0.4);
            --display-bg: #1e1e2f;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            background: var(--bg); color: var(--text);
            display: flex; justify-content: center; padding: 12px; min-height: 100vh;
            transition: background 0.3s;
        }
        .container {
            width: 100%; max-width: 580px; background: var(--surface);
            border-radius: 24px; box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            padding: 16px; display: flex; flex-direction: column; gap: 12px; position: relative;
        }
        .header { display: flex; justify-content: flex-end; align-items: center; }
        .menu-btn {
            width: 40px; height: 40px; border: none; background: var(--btn-bg);
            color: var(--text); font-size: 24px; font-weight: bold; border-radius: 12px;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
        }
        .menu {
            position: absolute; top: 60px; right: 16px; background: var(--surface);
            border-radius: 16px; box-shadow: 0 8px 24px rgba(0,0,0,0.3);
            padding: 12px; z-index: 100; min-width: 230px; display: none; border: 1px solid var(--border);
        }
        .menu.show { display: block; }
        .menu-item {
            display: flex; align-items: center; justify-content: space-between;
            padding: 10px 8px; border-bottom: 1px solid var(--border); color: var(--text); font-size: 16px;
        }
        .menu-item:last-child { border-bottom: none; }
        .menu-item select, .menu-item button {
            padding: 6px 10px; border-radius: 8px; border: 1px solid var(--border);
            background: var(--btn-bg); color: var(--text); font-size: 14px; cursor: pointer;
        }
        .theme-toggle {
            width: 50px; height: 26px; background: var(--btn-bg); border-radius: 13px;
            position: relative; cursor: pointer; border: 1px solid var(--border);
        }
        .theme-toggle::after {
            content: ''; width: 22px; height: 22px; background: var(--btn-active);
            border-radius: 50%; position: absolute; top: 1px; left: 2px; transition: 0.2s;
        }
        body.dark .theme-toggle::after { transform: translateX(24px); }
        .tab-content { display: flex; flex-direction: column; gap: 12px; }
        .display-container { display: flex; flex-direction: column; }
        .formula-display {
            padding: 8px 16px; font-size: 14px; text-align: right;
            background: var(--display-bg); border-radius: 16px 16px 0 0;
            color: var(--text-secondary); min-height: 36px; word-wrap: break-word;
            border-bottom: 1px solid var(--border);
        }
        .main-display-row {
            display: flex; align-items: center; background: var(--display-bg);
            border-radius: 0 0 16px 16px; padding: 0 16px;
        }
        .main-display-row label {
            font-size: 14px; color: var(--text-secondary); margin-right: 8px; white-space: nowrap;
        }
        .main-display {
            flex: 1; padding: 16px 0; font-size: 28px; text-align: right;
            background: transparent; border: none; font-weight: 500; color: var(--text);
            outline: none; width: 100%;
        }
        .field-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
        .field-row label { flex: 1; font-size: 14px; color: var(--text-secondary); }
        .field-row input, .field-row select {
            flex: 1; padding: 10px 8px; border: 1px solid var(--border);
            border-radius: 10px; background: var(--btn-bg); color: var(--text);
            font-size: 16px; text-align: right;
        }
        .engineer-block { display: none; flex-direction: column; gap: 6px; }
        .engineer-block.show { display: flex; }
        .info-panel {
            font-size: 12px; color: var(--text-secondary); font-style: italic;
            background: var(--display-bg); padding: 8px; border-radius: 12px;
            margin-top: 4px; display: none;
        }
        .info-panel.show { display: block; }
        .warning-text { color: #e06c00; font-weight: 500; font-size: 13px; margin-top: 4px; display: none; }
        .warning-text.show { display: block; }
        .btn-row { display: flex; gap: 8px; margin-top: 12px; }
        .calc-btn, .save-btn {
            flex: 1; padding: 14px; font-size: 16px; font-weight: bold;
            background: var(--btn-active); color: white; border: none; border-radius: 14px; cursor: pointer;
        }
        .save-btn:disabled { opacity: 0.5; cursor: default; }
        .result-area {
            background: var(--display-bg); border-radius: 16px; padding: 12px;
            display: flex; flex-direction: column; gap: 4px; font-size: 14px;
        }
        .result-area span { color: var(--text); }
        .note { color: #e06c00; font-weight: 500; }
</style>
</head>

<div class="container">

<button class="menu-btn" id="menuToggle">⋮</button>

</div>
</div>
</div>

</div>

<div class="field-row"><label id="lblPreset">Типичные среды:</label><select id="presetSelect">

<option value="water" id="presetWaterText">Вода</option>
<option value="oil" id="presetOilText">Масло</option>
<option value="air" id="presetAirText">Воздух</option>
<option value="nitrogen" id="presetNitrogenText">Азот</option>
<option value="oxygen" id="presetOxygenText">Кислород</option>
<option value="methane" id="presetMethaneText">Метан</option>
<option value="co2" id="presetCO2Text">CO₂</option>
<option value="parahydrogen" id="presetParahydrogenText">Водород (пара)</option>
<option value="normalhydrogen" id="presetNormalhydrogenText">Водород (норм.)</option>
<option value="helium4" id="presetHelium4Text">Гелий-4</option>
<option value="neon" id="presetNeonText">Неон</option>
<option value="argon" id="presetArgonText">Аргон</option>
<option value="krypton" id="presetKryptonText">Криптон</option>
<option value="xenon" id="presetXenonText">Ксенон</option>
<option value="ammonia" id="presetAmmoniaText">Аммиак</option>
<option value="ethane" id="presetEthaneText">Этан</option>
<option value="ethylene" id="presetEthyleneText">Этилен</option>
<option value="propane" id="presetPropaneText">Пропан</option>
<option value="freon22" id="presetFreon22Text">Фреон-22</option>
</select></div>
<div class="field-row"><label id="lblViscosity">Вязкость (cSt):</label><input type="number" id="viscosity" value="1.0" min="0.001" step="any"></div>
<div class="field-row"><label id="lblRoughness">Шероховатость (mm):</label><input type="number" id="roughness" value="0.1" min="0" step="any"></div>
<div class="field-row" id="gasPropsRow" style="display:none;"><label id="lblPressure">Абс. давление (bar):</label><input type="number" id="pressure" value="1.0" min="0.001" step="any"></div>
<div class="field-row" style="display:none;"><label id="lblTemperature">Температура (°C):</label><input type="number" id="temperature" value="20.0" min="-273.15" step="any"></div>
<div class="field-row" style="display:none;"><label id="lblMolarMass">Молярная масса (g/mol):</label><input type="number" id="molarMass" value="28.97" min="0.001" step="any"></div>
<div class="info-panel" id="infoPanel"></div>
<div class="warning-text" id="warningExtreme"></div>
</div>

<div class="field-row"><label id="lblPressureUnit">Единицы давления:</label><select id="pressureUnit"><option value="Pa">Pa</option><option value="kPa">kPa</option><option value="bar">bar</option><option value="kgf/cm²">kgf/cm²</option><option value="psi">psi</option></select></div>
<div class="btn-row">
<button class="calc-btn" id="calculateBtn">Рассчитать</button>
<button class="save-btn" id="saveBtn" disabled>Сохранить в файл</button>
</div>
<div class="result-area" id="resultArea">
<span id="velocityResult">Скорость: ---</span>
<span id="pressureDropResult">Потеря давления: ---</span>
<span id="reynoldsResult">Число Рейнольдса: ---</span>
<span id="lambdaResult">Коэффициент трения λ: ---</span>
<span id="compressNote" class="note"></span>
</div>
</div>
</div>

    // === Уравнение состояния Пенга–Робинсона (кубическое) ===
    function calcZ_PengRobinson(T, P_bar, Tc, Pc, w) {
    const R = 8.314462618; // Дж/(моль•К)
    const Tr = T / Tc;
    if (Tr <= 0 || Pc <= 0) return 1.0;

    // Параметры PR
    const kappa = 0.37464 + 1.54226 * w - 0.26992 * w * w;
    const alpha = Math.pow(1 + kappa * (1 - Math.sqrt(Tr)), 2);
    const a = 0.45724 * R * R * Tc * Tc / (Pc * 1e5) * alpha; // Па•м⁶/моль²
    const b = 0.07780 * R * Tc / (Pc * 1e5);                 // м³/моль

    const A = a * (P_bar * 1e5) / (R * R * T * T);
    const B = b * (P_bar * 1e5) / (R * T);

    // Кубическое уравнение: Z³ - (1-B)Z² + (A-2B-3B²)Z - (AB-B²-B³) = 0
    const a2 = -(1 - B);
    const a1 = A - 2*B - 3*B*B;
    const a0 = -(A*B - B*B - B*B*B);

    // Находим корни кубического уравнения
    const Q = (3*a1 - a2*a2) / 9;
    const R_ = (9*a2*a1 - 27*a0 - 2*a2*a2*a2) / 54;
    const D = Q*Q*Q + R_*R_;

    let Z;
    if (D >= 0) {
        // Один действительный корень
        const sqrtD = Math.sqrt(D);
        const S = Math.cbrt(R_ + sqrtD);
        const T_ = Math.cbrt(R_ - sqrtD);
        Z = S + T_ - a2/3;
    } else {
        // Три действительных корня, берём наибольший (газовая фаза) или наименьший (жидкость)
        const theta = Math.acos(R_ / Math.sqrt(-Q*Q*Q));
        const sqrtQ = Math.sqrt(-Q);
        const z1 = 2 * sqrtQ * Math.cos(theta/3) - a2/3;
        const z2 = 2 * sqrtQ * Math.cos((theta + 2*Math.PI)/3) - a2/3;
        const z3 = 2 * sqrtQ * Math.cos((theta + 4*Math.PI)/3) - a2/3;
        // Выбираем корень с наименьшей свободной энергией Гиббса, но для простоты
        // берём корень, соответствующий минимальному давлению (обычно наименьший Z для жидкости)
        // В сомнительных случаях лучше взять корень, при котором плотность будет больше.
        Z = Math.min(z1, z2, z3); // жидкоподобный корень (при высоких давлениях)
        // Проверка: если Z близко к B (что невозможно), то берём другой
        if (Z <= B) Z = Math.max(z1, z2, z3);
    }
    // Ограничиваем Z разумными пределами
    return Math.max(Z, 0.05);
}

// Замена для функции calcZ во всех вызовах (переопределим)
function calcZ(T, P_bar, Tc, Pc, w) {
    return calcZ_PengRobinson(T, P_bar, Tc, Pc, w);
}

    function calcRealGasDensity(T_C, P_bar, gas) {
        const M = parseFloat(document.getElementById('molarMass').value) || 28.97;
        const T_K = T_C + 273.15;
        const crit = gasCritical[gas];
        if (!crit) return (P_bar * 1e5 * (M/1000)) / (8.314 * T_K);
        const Z = calcZ(T_K, P_bar, crit.Tc, crit.Pc, crit.w);
        return (P_bar * 1e5 * (M/1000)) / (Z * 8.314 * T_K);
    }

    function calcRealGasViscosity(T_C, P_bar, gas) {
        const crit = gasCritical[gas];
        if (!crit) return null;
        const M = parseFloat(document.getElementById('molarMass').value) || 28.97;
        const T_K = T_C + 273.15;
        const Tc = crit.Tc, Pc = crit.Pc;
        const sigma = 2.44 * Math.pow(Tc / Pc, 1/3);
        const Tstar = T_K / (Tc * 0.77);
        const Omega = 1.16145 * Math.pow(Tstar, -0.14874) + 0.52487 * Math.exp(-0.77320 * Tstar) + 2.16178 * Math.exp(-2.43787 * Tstar);
        const mu0 = 2.6693e-6 * Math.sqrt(M * T_K) / (sigma * sigma * Omega);
        const Zc = 0.27;
        const Vc = Zc * 8.314 * Tc / (Pc * 1e5);
        const xi = Math.pow(Tc, 1/6) / (Math.pow(M, 0.5) * Math.pow(Pc, 2/3));
        const rho = calcRealGasDensity(T_C, P_bar, gas);
        const rho_molar = rho / (M / 1000);
        const rho_r = rho_molar * Vc;
        if (rho_r <= 0.001) return mu0;
        const poly = [1.023, 0.23364, 0.58533, -0.40758, 0.093324];
        let sum = 0;
        for (let i = 0; i < poly.length; i++) sum += poly[i] * Math.pow(rho_r, i);
        const mu0_uPas = mu0 * 1e6;
        const psi = mu0_uPas * xi;
        const mu_mu0 = 1 + (Math.pow(sum, 4) - 1) / psi;
        return mu0 * Math.max(mu_mu0, 0.5);
    }

    function syncFromTemperatureAndPressure() {
        if (updating) return;
        if (modeSelect.value !== 'engineer' || mediumSelect.value !== 'gas') return;
        updating = true;
        const T = parseFloat(document.getElementById('temperature').value);
        const P = parseFloat(document.getElementById('pressure').value);
        const gas = presetSelect.value;
        if (!isNaN(T) && T > -273.14) {
            const P_bar = isNaN(P) ? 1.0 : Math.max(P, 0.001);
            const densityReal = calcRealGasDensity(T, P_bar, gas);
            if (densityReal > 0) document.getElementById('density').value = densityReal.toFixed(4);
            const mu_dyn = calcRealGasViscosity(T, P_bar, gas);
            if (mu_dyn && densityReal > 0) {
                document.getElementById('viscosity').value = (mu_dyn / densityReal * 1e6).toFixed(4);
            }
        }
        updating = false;
    }

    function syncFromDensity() {
        if (updating) return;
        if (modeSelect.value !== 'engineer' || mediumSelect.value !== 'gas') return;
        updating = true;
        const P = parseFloat(document.getElementById('pressure').value);
        const rho = parseFloat(document.getElementById('density').value);
        const gas = presetSelect.value;
        if (!isNaN(P) && P > 0 && !isNaN(rho) && rho > 0) {
            let T_C = 20;
            for (let i = 0; i < 20; i++) {
                const rho_calc = calcRealGasDensity(T_C, P, gas);
                if (Math.abs(rho_calc - rho) < 0.001) break;
                T_C += (rho - rho_calc) * 0.1;
                if (T_C < -273.14) break;
            }
            document.getElementById('temperature').value = T_C.toFixed(2);
            const mu_dyn = calcRealGasViscosity(T_C, P, gas);
            if (mu_dyn && rho > 0) {
                document.getElementById('viscosity').value = (mu_dyn / rho * 1e6).toFixed(4);
            }
        }
        updating = false;
    }

                const tmin = limits.Tmin - 273.15;
                const tmax = limits.Tmax - 273.15;
                const pmin = limits.Pmin * 10;
                const pmax = limits.Pmax * 10;
                if (!isNaN(T) && (T < tmin || T > tmax)) msgs.push(t('warningExtremeTemp'));

            if (msgs.length) {
                warningExtreme.textContent = msgs.join(' ') + ' ' + t('warningIdealGas');
                warningExtreme.classList.add('show');

        } else {
            const density = parseFloat(document.getElementById('density').value);
            const viscosity = parseFloat(document.getElementById('viscosity').value);
            const liq = liquidLimits[preset];
            if (liq) {
                let msgs = [];

                if (!isNaN(viscosity) && (viscosity < liq.viscosityMin || viscosity > liq.viscosityMax)) msgs.push(t('warningLiquidViscosity'));
                if (msgs.length) {
                    warningExtreme.textContent = msgs.join(' ');
                    warningExtreme.classList.add('show');
                }
            }
        }
    }

    document.getElementById('temperature').addEventListener('change', checkConditions);
    document.getElementById('pressure').addEventListener('change', checkConditions);
    document.getElementById('density').addEventListener('change', checkConditions);
    document.getElementById('viscosity').addEventListener('change', checkConditions);

    function updatePropertiesForState(preset) {
        const density = document.getElementById('density');
        const viscosity = document.getElementById('viscosity');
        const roughness = document.getElementById('roughness');
        const molarMass = document.getElementById('molarMass');
        const isLiquid = mediumSelect.value==='liquid';
        roughness.value=0.05;
        if (preset=='water') { density.value=1000; viscosity.value=1.0; roughness.value=0.1; }
        else if (preset=='oil') { density.value=900; viscosity.value=50.0; roughness.value=0.1; }
        else if (preset=='air') { if(isLiquid){density.value=870;viscosity.value=0.17;} else{density.value=1.20;viscosity.value=15.0;molarMass.value=28.97;} }
        else if (preset=='nitrogen') { if(isLiquid){density.value=808;viscosity.value=0.16;} else{density.value=1.165;viscosity.value=15.1;molarMass.value=28.01;} }
        else if (preset=='oxygen') { if(isLiquid){density.value=1140;viscosity.value=0.19;} else{density.value=1.33;viscosity.value=15.7;molarMass.value=32.00;} }
        else if (preset=='methane') { if(isLiquid){density.value=422;viscosity.value=0.12;} else{density.value=0.66;viscosity.value=11.0;molarMass.value=16.04;} }
        else if (preset=='co2') { if(isLiquid){density.value=1100;viscosity.value=0.08;} else{density.value=1.84;viscosity.value=8.0;molarMass.value=44.01;} }
        else if (preset=='parahydrogen') { if(isLiquid){density.value=70.8;viscosity.value=0.13;} else{density.value=0.084;viscosity.value=105.0;molarMass.value=2.016;} }
        else if (preset=='normalhydrogen') { if(isLiquid){density.value=70.8;viscosity.value=0.13;} else{density.value=0.084;viscosity.value=105.0;molarMass.value=2.016;} }
        else if (preset=='helium4') { if(isLiquid){density.value=125;viscosity.value=0.028;} else{density.value=0.166;viscosity.value=120.0;molarMass.value=4.0026;} }
        else if (preset=='neon') { if(isLiquid){density.value=1206;viscosity.value=0.12;} else{density.value=0.84;viscosity.value=37.8;molarMass.value=20.18;} }
        else if (preset=='argon') { if(isLiquid){density.value=1394;viscosity.value=0.27;} else{density.value=1.66;viscosity.value=13.6;molarMass.value=39.95;} }
        else if (preset=='krypton') { if(isLiquid){density.value=2413;viscosity.value=0.22;} else{density.value=3.5;viscosity.value=7.3;molarMass.value=83.80;} }
        else if (preset=='xenon') { if(isLiquid){density.value=3057;viscosity.value=0.22;} else{density.value=5.5;viscosity.value=4.45;molarMass.value=131.29;} }
        else if (preset=='ammonia') { if(isLiquid){density.value=682;viscosity.value=0.25;} else{density.value=0.73;viscosity.value=13.5;molarMass.value=17.03;} }
        else if (preset=='ethane') { if(isLiquid){density.value=546;viscosity.value=0.3;} else{density.value=1.26;viscosity.value=7.5;molarMass.value=30.07;} }
        else if (preset=='ethylene') { if(isLiquid){density.value=567;viscosity.value=0.2;} else{density.value=1.18;viscosity.value=9.5;molarMass.value=28.05;} }
        else if (preset=='propane') { if(isLiquid){density.value=493;viscosity.value=0.2;} else{density.value=1.88;viscosity.value=4.4;molarMass.value=44.1;} }
        else if (preset=='freon22') { if(isLiquid){density.value=1194;viscosity.value=0.2;} else{density.value=3.5;viscosity.value=0.3;molarMass.value=86.47;} }
    }

    function applyPreset(preset) {
        if (preset=='water'||preset=='oil') mediumSelect.value='liquid';
        else mediumSelect.value='gas';
        updatePropertiesForState(preset);
        applyGasLimits();
        updateEngineerVisibility();
        if (mediumSelect.value === 'gas') syncFromTemperatureAndPressure();
        checkConditions();
        resetResults();
    }

    function resetResults() {
        lastResult = { velocity:0, deltaP:0, re:0, lambda:0, mode:'', mediumType:'', preset:'', pressureUnit:'Pa' };
        updateResultLabels();
        compressNote.textContent='';
        saveBtn.disabled=true;
        formulaDisplay.textContent=t('ready');
        mainDisplay.value='0';
    }
    function updateResultLabels() {
        velocityResult.textContent = t('velocity')+': '+(lastResult.velocity>0?lastResult.velocity.toFixed(3)+' m/s':'---');
        pressureDropResult.textContent = t('pressureDrop')+': '+(lastResult.deltaP>0?formatPressure(lastResult.deltaP,lastResult.pressureUnit):'---');
        reynoldsResult.textContent = t('reynolds')+': '+(lastResult.re>0?lastResult.re.toFixed(0):'---');
        lambdaResult.textContent = t('lambda')+': '+(lastResult.lambda>0?lastResult.lambda.toFixed(4):'---');
    }
    function updateDisplayWithResult() {
        const unit = lastResult.pressureUnit;
        const pf = formatPressure(lastResult.deltaP, unit);
        formulaDisplay.textContent = t('resultSummary').replace('{velocity}',lastResult.velocity.toFixed(3)).replace('{pressure}',pf.split(' ')[0]).replace('{unit}',unit);
        mainDisplay.value = lastResult.velocity.toFixed(3);
    }

    calculateBtn.addEventListener('click', ()=>{
        try {
            const bends = parseInt(document.getElementById('bends').value)||0;
            const valves = parseInt(document.getElementById('valves').value)||0;
            const outerD = parseFloat(document.getElementById('outerDiam').value);
            const wall = parseFloat(document.getElementById('wall').value);
            const density = parseFloat(document.getElementById('density').value);
            const length = parseFloat(document.getElementById('length').value);
            const massFlow = parseFloat(document.getElementById('massFlow').value);
            if (outerD<=0||wall<0||outerD-2*wall<=0) { alert(t('errorDiam')); return; }
            if (density<=0||length<=0||massFlow<=0) { alert(t('errorPos')); return; }
            const innerD = outerD-2*wall;
            const area = Math.PI*Math.pow(innerD/1000,2)/4;
            const velocity = massFlow/3600/area/density;
            let deltaP, lambda=0, re=0, compressMsg='';
            if (modeSelect.value=='simple') {
                deltaP = density*Math.pow(velocity,2)/2*(41*length/innerD+5*valves+0.17*bends);
                lastResult.mode='simple';
            } else {
                const viscosity = parseFloat(document.getElementById('viscosity').value);
                const roughness = parseFloat(document.getElementById('roughness').value);
                const kinVisc = viscosity*1e-6;
                const medium = mediumSelect.value;
                lastResult.mediumType=medium; lastResult.preset=presetSelect.value;
                if (medium=='gas') {
                    const pressure = parseFloat(document.getElementById('pressure').value)*1e5;
                    const temperature = parseFloat(document.getElementById('temperature').value)+273.15;
                    const molarMass = parseFloat(document.getElementById('molarMass').value)/1000;
                    const R=8.314;
                    const densityCalc = pressure*molarMass/(R*temperature);
                    const diff = Math.abs(density-densityCalc)/densityCalc*100;
                    if (diff>10) compressMsg = t('compressNote').replace('%.1f', diff.toFixed(1));
                    const gamma = getGamma(presetSelect.value);
                    const soundSpeed = Math.sqrt(gamma*R*temperature/molarMass);
                    if (velocity/soundSpeed>0.3) compressMsg += (compressMsg?'\n':'') + t('compressMach');
                }
                re = velocity*(innerD/1000)/kinVisc;
                lambda = (re<2300)?64/re:0.25/Math.pow(Math.log10(roughness/innerD/3.7+5.74/Math.pow(re,0.9)),2);
                const totalZeta = lambda*length*1000/innerD + bends*0.3 + valves*3.0;
                deltaP = totalZeta*density*velocity*velocity/2;
                lastResult.re=re; lastResult.lambda=lambda;
                reynoldsResult.textContent = t('reynolds')+': '+re.toFixed(0);
                lambdaResult.textContent = t('lambda')+': '+lambda.toFixed(4);
                compressNote.textContent = compressMsg;
            }
            lastResult.velocity=velocity; lastResult.deltaP=deltaP;
            lastResult.pressureUnit = document.getElementById('pressureUnit').value;
            velocityResult.textContent = t('velocity')+': '+velocity.toFixed(3)+' m/s';
            pressureDropResult.textContent = t('pressureDrop')+': '+formatPressure(deltaP,lastResult.pressureUnit);
            saveBtn.disabled=false;
            updateDisplayWithResult();
        } catch (e) { alert(t('errorNum')); }
    });

    function getGamma(p){
        const m={
            air:1.4, nitrogen:1.4, oxygen:1.4, methane:1.31, co2:1.3,
            parahydrogen:1.41, normalhydrogen:1.41, helium4:1.67, neon:1.67,
            argon:1.67, krypton:1.67, xenon:1.67, ammonia:1.33,
            ethane:1.2, ethylene:1.24, propane:1.13, freon22:1.19
        };
        return m[p]||1.4;
    }
    function formatPressure(pa,unit) {
        let v; switch(unit){ case'Pa':v=pa;break; case'kPa':v=pa/1e3;break; case'bar':v=pa/1e5;break; case'kgf/cm²':v=pa/98066.5;break; case'psi':v=pa/6894.76;break; default:v=pa; }
        return v.toFixed(3)+' '+unit;
    }

    saveBtn.addEventListener('click', ()=>{
        const report = buildReport();
        if (typeof AndroidSave!=='undefined' && AndroidSave.saveReport) AndroidSave.saveReport(report);
        else {
            const blob = new Blob([report],{type:'text/plain'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href=url;
            a.download = 'hydraulic_report_'+new Date().toISOString().slice(0,19).replace(/:/g,'-')+'.txt';
            a.click(); URL.revokeObjectURL(url);
            alert(t('fileSaved'));
        }
    });

    function buildReport() {
        const loc = locales[currentLang];
        let r = `=== ${loc.title} ===\n${new Date().toLocaleString()}\n`;
        if (lastResult.mode=='engineer') r += `${loc.medium} ${loc[lastResult.mediumType]||lastResult.mediumType}\n${loc.presetLabel} ${loc['preset'+(lastResult.preset.charAt(0).toUpperCase()+lastResult.preset.slice(1))]||lastResult.preset}\n`;
        r += `\n--- ${loc.calculate} ---\n`;
        r += `${loc.bends} ${document.getElementById('bends').value}\n`;
        r += `${loc.valves} ${document.getElementById('valves').value}\n`;
        r += `${loc.outerDiam} ${document.getElementById('outerDiam').value} mm\n`;
        r += `${loc.wall} ${document.getElementById('wall').value} mm\n`;
        r += `${loc.length} ${document.getElementById('length').value} m\n`;
        r += `${loc.massFlow} ${document.getElementById('massFlow').value} kg/h\n`;
        r += `${loc.density} ${document.getElementById('density').value} kg/m³\n`;
        if (lastResult.mode=='engineer') {
            r += `${loc.viscosity} ${document.getElementById('viscosity').value} cSt\n`;
            r += `${loc.roughness} ${document.getElementById('roughness').value} mm\n`;
            if (lastResult.mediumType=='gas') {
                r += `${loc.pressure} ${document.getElementById('pressure').value} bar\n`;
                r += `${loc.temperature} ${document.getElementById('temperature').value} °C\n`;
                r += `${loc.molarMass} ${document.getElementById('molarMass').value} g/mol\n`;
            }
        }
        r += `\n--- ${loc.save} ---\n`;
        r += `${loc.velocity}: ${lastResult.velocity.toFixed(3)} m/s\n`;
        r += `${loc.pressureDrop}: ${formatPressure(lastResult.deltaP,lastResult.pressureUnit)}\n`;
        if (lastResult.re>0) r += `${loc.reynolds}: ${lastResult.re.toFixed(0)}\n`;
        if (lastResult.lambda>0) r += `${loc.lambda}: ${lastResult.lambda.toFixed(4)}\n`;
        return r;
    }

    shareBtn.addEventListener('click', ()=>{
    const shareUrl = 'https://github.com/Empers100/HydraulicCalculator';
    const textOnly = (lastResult.velocity>0) ? buildReport() : t('shareText');
    if (typeof AndroidShare!=='undefined' && AndroidShare.shareText) {
        AndroidShare.shareText(t('title'), textOnly, shareUrl);
    } else if (navigator.share) {
        navigator.share({
            title: t('title'),
            text: textOnly,
            url: shareUrl
        }).catch(()=>{});
    } else {
        const fullText = textOnly + '\n' + shareUrl;
        navigator.clipboard.writeText(fullText)
            .then(()=>alert(t('shareFallback')))
            .catch(()=>prompt(t('shareFallback'), fullText));
    }
    settingsMenu.classList.remove('show');
});

    document.querySelectorAll('input[type="number"]').forEach(input => {
        if (input.id==='temperature') return;
        input.addEventListener('keydown', e=>{ if(e.key==='-'||e.key==='+'||e.key==='e'||e.key==='E') e.preventDefault(); });
        input.addEventListener('input', function() {
            this.value = this.value.replace(/[^\d.,]/g, '').replace(',', '.');
            const dotIndex = this.value.indexOf('.');
            if (dotIndex !== -1) this.value = this.value.substring(0, dotIndex+1) + this.value.substring(dotIndex+1).replace(/\./g, '');
        });
        input.addEventListener('blur', function() {
            if (this.id==='bends'||this.id==='valves') {
                let i = parseInt(this.value);
                this.value = (!isNaN(i) && i>=0) ? i : 0;
            }
            if (this.value.endsWith('.')) this.value = this.value.slice(0, -1);
        });
    });

    updateEngineerVisibility();
})();
</script>
</body>
</html>
